<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Artful Affair — IG Feed · Gallery Glam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --fg: #F5F5F5;
    --neon-pink: #E0207A;
    --neon-blue: #0098CC;
    --neon-green: #6B8F00;
    --neon-orange: #E04A2A;
    --neon-violet: #8A30C4;
    --muted: #999;
    --faint: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }

  .page {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    transform-origin: top left;
  }

  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  .paint { position: absolute; pointer-events: none; z-index: 0; }
  .p1 { width: 700px; height: 460px; background: var(--neon-violet); opacity: 0.22; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; top: -120px; left: -140px; transform: rotate(-12deg); filter: blur(80px); }
  .p2 { width: 600px; height: 440px; background: var(--neon-pink); opacity: 0.20; border-radius: 82% 18% 76% 24% / 54% 46% 62% 38%; top: -60px; right: -160px; transform: rotate(14deg); filter: blur(70px); }
  .p3 { width: 540px; height: 360px; background: var(--neon-orange); opacity: 0.16; border-radius: 70% 30% 60% 40% / 45% 55% 50% 50%; bottom: -80px; left: -100px; transform: rotate(-6deg); filter: blur(70px); }
  .p4 { width: 580px; height: 380px; background: var(--neon-blue); opacity: 0.14; border-radius: 24% 76% 35% 65% / 62% 38% 68% 32%; bottom: -100px; right: -120px; transform: rotate(10deg); filter: blur(70px); }
  .p5 { width: 520px; height: 240px; background: var(--neon-green); opacity: 0.08; border-radius: 85% 15% 80% 20% / 55% 45% 60% 40%; top: 480px; left: 50%; margin-left: -260px; transform: rotate(3deg); filter: blur(60px); }

  .dot { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 70px 70px;
  }

  .label-top {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 50px;
  }
  .label-top .line {
    width: 80px;
    height: 1px;
    background: var(--muted);
    opacity: 0.5;
  }
  .label-top .text {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .gg {
    text-align: center;
    margin-bottom: 50px;
  }
  .gg .gallery {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    line-height: 0.85;
    letter-spacing: 0.02em;
    -webkit-text-stroke: 3px var(--neon-pink);
    color: transparent;
    position: relative;
    display: inline-block;
  }
  .gg .gallery::before {
    content: '';
    position: absolute;
    width: 110%;
    height: 60%;
    background: var(--neon-violet);
    opacity: 0.20;
    border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
    top: 22%;
    left: -5%;
    z-index: -1;
    filter: blur(8px);
  }
  .gg .glam {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 180px;
    line-height: 0.95;
    color: var(--fg);
    margin-top: -8px;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 36px;
    line-height: 1.4;
    color: var(--fg);
    text-align: center;
    margin-bottom: 22px;
    max-width: 720px;
  }

  .vibes {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 50px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .vibe {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg);
  }
  .vibe-sep {
    color: var(--neon-pink);
    font-size: 14px;
  }

  .footer {
    text-align: center;
  }
  .footer-when {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .url {
    font-size: 22px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: 0.04em;
    margin-bottom: 12px;
  }
  .handle {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--neon-pink);
  }
</style>
</head>
<body>
<div class="page">
  <div class="paint p1"></div>
  <div class="paint p2"></div>
  <div class="paint p3"></div>
  <div class="paint p4"></div>
  <div class="paint p5"></div>

  <div class="dot" style="width:14px;height:14px;background:var(--neon-pink);top:8%;right:14%;opacity:0.4;"></div>
  <div class="dot" style="width:10px;height:10px;background:var(--neon-blue);top:42%;right:6%;opacity:0.35;"></div>
  <div class="dot" style="width:9px;height:9px;background:var(--neon-green);top:30%;left:5%;opacity:0.3;"></div>
  <div class="dot" style="width:12px;height:12px;background:var(--neon-orange);bottom:18%;left:7%;opacity:0.35;"></div>
  <div class="dot" style="width:7px;height:7px;background:var(--neon-violet);bottom:38%;right:9%;opacity:0.3;"></div>

  <div class="content">
    <div class="label-top">
      <span class="line"></span>
      <span class="text">Dress Code</span>
      <span class="line"></span>
    </div>

    <div class="gg">
      <div class="gallery">GALLERY</div>
      <div class="glam">glam</div>
    </div>

    <p class="tagline">Cocktail attire with a neon edge.<br>Wear the art. Be the art.</p>

    <div class="vibes">
      <span class="vibe">Sequins</span>
      <span class="vibe-sep">&#10038;</span>
      <span class="vibe">Velvet</span>
      <span class="vibe-sep">&#10038;</span>
      <span class="vibe">Color</span>
      <span class="vibe-sep">&#10038;</span>
      <span class="vibe">Statement</span>
    </div>

    <div class="footer">
      <p class="footer-when">April 18 &middot; 1600 SE Division</p>
      <p class="url">auction.supportabernethy.org</p>
      <p class="handle">@abernethypta</p>
    </div>
  </div>
</div>

<script>
  function scaleToFit() {
    var page = document.querySelector('.page');
    var sx = window.innerWidth / 1080;
    var sy = window.innerHeight / 1080;
    var scale = Math.min(sx, sy, 1);
    page.style.transform = 'scale(' + scale + ')';
    document.documentElement.style.width = (1080 * scale) + 'px';
    document.documentElement.style.height = (1080 * scale) + 'px';
    document.body.style.width = (1080 * scale) + 'px';
    document.body.style.height = (1080 * scale) + 'px';
  }
  scaleToFit();
  window.addEventListener('resize', scaleToFit);
</script>
</body>
</html>
