<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Artful Affair — IG Story · Bidding Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --fg: #F5F5F5;
    --neon-pink: #E0207A;
    --neon-blue: #0098CC;
    --neon-green: #6B8F00;
    --neon-orange: #E04A2A;
    --neon-violet: #8A30C4;
    --muted: #999;
    --faint: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  .page {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    transform-origin: top left;
  }

  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  .paint { position: absolute; pointer-events: none; z-index: 0; }
  .p1 { width: 700px; height: 460px; background: var(--neon-blue); opacity: 0.20; border-radius: 24% 76% 35% 65% / 62% 38% 68% 32%; top: -120px; right: -160px; transform: rotate(14deg); filter: blur(80px); }
  .p2 { width: 580px; height: 480px; background: var(--neon-violet); opacity: 0.16; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; top: 320px; left: -150px; transform: rotate(-18deg); filter: blur(70px); }
  .p3 { width: 540px; height: 400px; background: var(--neon-pink); opacity: 0.16; border-radius: 82% 18% 76% 24% / 54% 46% 62% 38%; top: 1100px; right: -100px; transform: rotate(-8deg); filter: blur(60px); }
  .p4 { width: 480px; height: 360px; background: var(--neon-orange); opacity: 0.10; border-radius: 70% 30% 60% 40% / 45% 55% 50% 50%; bottom: 240px; left: -100px; transform: rotate(6deg); filter: blur(70px); }
  .p5 { width: 600px; height: 320px; background: var(--neon-green); opacity: 0.10; border-radius: 85% 15% 80% 20% / 55% 45% 60% 40%; bottom: -80px; left: 120px; transform: rotate(3deg); filter: blur(60px); }

  .dot { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 120px 80px 100px;
  }

  .label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
    text-align: center;
  }

  /* Live tag */
  .live-tag {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 14px 28px;
    border: 2px solid var(--neon-pink);
    border-radius: 4px;
    margin-bottom: 50px;
  }
  .live-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 18px var(--neon-pink);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .live-text {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--neon-pink);
  }

  .headline {
    text-align: center;
    margin-bottom: 70px;
  }
  .headline .l1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    line-height: 0.85;
    letter-spacing: 0.02em;
    -webkit-text-stroke: 3px var(--neon-blue);
    color: transparent;
    position: relative;
    display: inline-block;
  }
  .headline .l1::before {
    content: '';
    position: absolute;
    width: 110%;
    height: 60%;
    background: var(--neon-blue);
    opacity: 0.16;
    border-radius: 24% 76% 35% 65% / 50% 50% 55% 45%;
    top: 22%;
    left: -5%;
    z-index: -1;
    filter: blur(8px);
  }
  .headline .l2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 200px;
    line-height: 0.85;
    letter-spacing: 0.02em;
    color: var(--fg);
  }
  .headline .l3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 100px;
    line-height: 1.0;
    color: var(--fg);
    margin-top: 6px;
  }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    align-items: stretch;
    width: 100%;
    margin-bottom: 60px;
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 0 16px;
  }
  .stat + .stat { border-left: 1px solid var(--faint); }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 0.85;
    color: var(--fg);
  }
  .stat-num .accent-pink { color: var(--neon-pink); }
  .stat-num .accent-blue { color: var(--neon-blue); }
  .stat-num .accent-violet { color: var(--neon-violet); }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 14px;
  }

  /* Closes */
  .closes {
    text-align: center;
    margin-bottom: 16px;
  }
  .closes-label {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .closes-date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 76px;
    letter-spacing: 0.04em;
    color: var(--fg);
    line-height: 1;
  }

  .footer {
    margin-top: auto;
    text-align: center;
  }
  .url {
    font-size: 26px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: 0.04em;
    margin-bottom: 22px;
  }
  .handle {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--neon-pink);
  }
</style>
</head>
<body>
<div class="page">
  <div class="paint p1"></div>
  <div class="paint p2"></div>
  <div class="paint p3"></div>
  <div class="paint p4"></div>
  <div class="paint p5"></div>

  <div class="dot" style="width:18px;height:18px;background:var(--neon-pink);top:7%;left:12%;opacity:0.4;"></div>
  <div class="dot" style="width:12px;height:12px;background:var(--neon-blue);top:38%;left:6%;opacity:0.35;"></div>
  <div class="dot" style="width:10px;height:10px;background:var(--neon-green);top:28%;right:5%;opacity:0.3;"></div>
  <div class="dot" style="width:14px;height:14px;background:var(--neon-orange);bottom:24%;right:8%;opacity:0.35;"></div>
  <div class="dot" style="width:8px;height:8px;background:var(--neon-violet);bottom:42%;left:8%;opacity:0.3;"></div>

  <div class="content">
    <p class="label">Abernethy Auction 2026</p>

    <div class="live-tag">
      <span class="live-dot"></span>
      <span class="live-text">Bidding Open</span>
    </div>

    <div class="headline">
      <div class="l1">ONLINE</div>
      <div class="l2">AUCTION</div>
      <div class="l3">is live</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-num"><span class="accent-pink">80+</span></div>
        <div class="stat-label">Prizes</div>
      </div>
      <div class="stat">
        <div class="stat-num"><span class="accent-blue">19</span></div>
        <div class="stat-label">Parties</div>
      </div>
      <div class="stat">
        <div class="stat-num"><span class="accent-violet">∞</span></div>
        <div class="stat-label">Raffle</div>
      </div>
    </div>

    <div class="closes">
      <div class="closes-label">Closes</div>
      <div class="closes-date">SUNDAY &middot; APRIL 19</div>
    </div>

    <div class="footer">
      <p class="url">auction.supportabernethy.org</p>
      <p class="handle">@abernethypta</p>
    </div>
  </div>
</div>

<script>
  function scaleToFit() {
    var page = document.querySelector('.page');
    var sx = window.innerWidth / 1080;
    var sy = window.innerHeight / 1920;
    var scale = Math.min(sx, sy, 1);
    page.style.transform = 'scale(' + scale + ')';
    document.documentElement.style.width = (1080 * scale) + 'px';
    document.documentElement.style.height = (1920 * scale) + 'px';
    document.body.style.width = (1080 * scale) + 'px';
    document.body.style.height = (1920 * scale) + 'px';
  }
  scaleToFit();
  window.addEventListener('resize', scaleToFit);
</script>
</body>
</html>
