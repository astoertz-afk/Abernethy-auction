<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Artful Affair — IG Story · This Saturday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0A0A;
    --fg: #F5F5F5;
    --neon-pink: #E0207A;
    --neon-blue: #0098CC;
    --neon-green: #6B8F00;
    --neon-orange: #E04A2A;
    --neon-violet: #8A30C4;
    --muted: #999;
    --faint: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  .page {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
    transform-origin: top left;
  }

  /* Grain */
  .page::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 200px 200px;
  }

  .paint { position: absolute; pointer-events: none; z-index: 0; }
  .p1 { width: 700px; height: 440px; background: var(--neon-pink); opacity: 0.20; border-radius: 82% 18% 76% 24% / 54% 46% 62% 38%; top: -100px; left: -120px; transform: rotate(-8deg); filter: blur(70px); }
  .p2 { width: 540px; height: 480px; background: var(--neon-blue); opacity: 0.14; border-radius: 24% 76% 35% 65% / 62% 38% 68% 32%; top: 240px; right: -140px; transform: rotate(14deg); filter: blur(80px); }
  .p3 { width: 460px; height: 380px; background: var(--neon-violet); opacity: 0.16; border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%; top: 1020px; left: -100px; transform: rotate(-18deg); filter: blur(60px); }
  .p4 { width: 480px; height: 400px; background: var(--neon-orange); opacity: 0.12; border-radius: 70% 30% 60% 40% / 45% 55% 50% 50%; bottom: 280px; right: -100px; transform: rotate(6deg); filter: blur(70px); }
  .p5 { width: 600px; height: 320px; background: var(--neon-green); opacity: 0.10; border-radius: 85% 15% 80% 20% / 55% 45% 60% 40%; bottom: -60px; left: 180px; transform: rotate(3deg); filter: blur(60px); }

  .dot { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 130px 80px 100px;
  }

  .label {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 60px;
  }

  .urgent {
    text-align: center;
    margin-bottom: 70px;
  }
  .urgent .this {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 96px;
    line-height: 0.95;
    color: var(--fg);
    margin-bottom: 4px;
  }
  .urgent .saturday {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 240px;
    line-height: 0.85;
    letter-spacing: 0.02em;
    -webkit-text-stroke: 3px var(--neon-pink);
    color: transparent;
    position: relative;
    display: inline-block;
  }
  .urgent .saturday::before {
    content: '';
    position: absolute;
    width: 110%;
    height: 60%;
    background: var(--neon-pink);
    opacity: 0.18;
    border-radius: 82% 18% 76% 24% / 50% 50% 55% 45%;
    top: 22%;
    left: -5%;
    z-index: -1;
    transform: rotate(-2deg);
    filter: blur(8px);
  }

  .title {
    text-align: center;
    margin-bottom: 60px;
  }
  .title .l1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 70px;
    line-height: 0.9;
    letter-spacing: 0.04em;
    color: var(--fg);
  }
  .title .l2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 130px;
    line-height: 0.85;
    letter-spacing: 0.03em;
    color: var(--fg);
  }
  .title .l3 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 78px;
    line-height: 1.0;
    color: var(--fg);
  }

  .sep {
    width: 70%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-blue), transparent);
    opacity: 0.5;
    margin-bottom: 50px;
  }

  .when {
    text-align: center;
    margin-bottom: 18px;
  }
  .when .date {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 0.04em;
    color: var(--fg);
    line-height: 1;
  }
  .when .time {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 10px;
  }

  .where {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 50px;
  }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 30px;
    margin-bottom: 60px;
  }
  .price-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 130px;
    line-height: 0.85;
    color: var(--fg);
  }
  .price-meta {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.4;
  }

  .footer {
    margin-top: auto;
    text-align: center;
  }
  .url {
    font-size: 26px;
    font-weight: 700;
    color: var(--fg);
    letter-spacing: 0.04em;
    margin-bottom: 22px;
  }
  .handle {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--neon-pink);
  }
</style>
</head>
<body>
<div class="page">
  <div class="paint p1"></div>
  <div class="paint p2"></div>
  <div class="paint p3"></div>
  <div class="paint p4"></div>
  <div class="paint p5"></div>

  <div class="dot" style="width:18px;height:18px;background:var(--neon-pink);top:6%;right:14%;opacity:0.4;"></div>
  <div class="dot" style="width:12px;height:12px;background:var(--neon-blue);top:42%;right:6%;opacity:0.35;"></div>
  <div class="dot" style="width:10px;height:10px;background:var(--neon-green);top:30%;left:5%;opacity:0.3;"></div>
  <div class="dot" style="width:14px;height:14px;background:var(--neon-orange);bottom:22%;left:7%;opacity:0.35;"></div>
  <div class="dot" style="width:8px;height:8px;background:var(--neon-violet);bottom:38%;right:9%;opacity:0.3;"></div>

  <div class="content">
    <p class="label">Abernethy Elementary Presents</p>

    <div class="urgent">
      <div class="this">this</div>
      <div class="saturday">SATURDAY</div>
    </div>

    <div class="title">
      <div class="l1">AN</div>
      <div class="l2">ARTFUL</div>
      <div class="l3">Affair</div>
    </div>

    <div class="sep"></div>

    <div class="when">
      <div class="date">APRIL 18</div>
      <div class="time">5 &middot; 10 PM</div>
    </div>
    <div class="where">1600 SE Division &middot; Portland</div>

    <div class="price-row">
      <div class="price-amount">$100</div>
      <div class="price-meta">per person<br>adults only</div>
    </div>

    <div class="footer">
      <p class="url">auction.supportabernethy.org</p>
      <p class="handle">@abernethypta</p>
    </div>
  </div>
</div>

<script>
  // Preview-only scaling. Browser window can be any size; the .page renders at 1080x1920
  // and we scale it visually to fit the window. Doesn't affect PNG export.
  function scaleToFit() {
    var page = document.querySelector('.page');
    var sx = window.innerWidth / 1080;
    var sy = window.innerHeight / 1920;
    var scale = Math.min(sx, sy, 1);
    page.style.transform = 'scale(' + scale + ')';
    document.documentElement.style.width = (1080 * scale) + 'px';
    document.documentElement.style.height = (1920 * scale) + 'px';
    document.body.style.width = (1080 * scale) + 'px';
    document.body.style.height = (1920 * scale) + 'px';
  }
  scaleToFit();
  window.addEventListener('resize', scaleToFit);
</script>
</body>
</html>
